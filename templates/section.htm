<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Test</title>
        <link rel="stylesheet" href="/static/bulma.min.css" />
        <link rel="stylesheet" href="/static/global.css" />
        <script src="/static/htmx.js"></script>
    </head>

    <body>


        <div class="container is-max-tablet">
            <div class="content">
                <h1>Cheatsheet for {{ .SectionName }}</h1>
                <a href="/sheet/{{.SectionName}}/add" class="button is-info is-light">
                    Add card
                </a>
            </div>

            {{ range .Cards }}
            <div id="card_{{.Id}}" class="card">
                <div class="note">
                    <div class="title">{{ .Name }}</div>
                    <div class="date">{{ .LastUpdated }}</div>
                    <div>
                        <span
                            hx-delete="/sheet/{{$.SectionName}}/{{.Id}}"
                            hx-target="#card_{{.Id}}"
                            hx-swap="delete"
                            class="icon fa fa-trash is-clickable"
                        ></span>
                        <a href="/sheet/{{$.SectionName}}/{{.Id}}/edit">
                            <span
                                class="icon fa fa-pen-to-square is-clickable"
                                style="float: right; color: darkslategray"
                            ></span>
                        </a>
                    </div>

                    <div class="note-content">
                        <div class="content">
                            <p>{{ .Description }}</p>
                        </div>
                    </div>
                </div>
            </div>
            {{ end }}
        </div>
    </body>
</html>
